name: CD

on:
  merge_group:
  push:
    branches:
      - test-publish
    tags:
      - '*'
  release:
    types: [published]

permissions:
  contents: read

jobs:
  packaging:
    if: github.repository_owner == 'sgkit-dev'
    name: Packaging
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Build artefacts
        run: uv build

      - name: Store the distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish-to-pypi:
    if: github.repository_owner == 'sgkit-dev' && github.event_name == 'release'
    needs:
      - packaging
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/biofuse
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: python-package-distributions
        path: dist/
    - name: Show artifacts
      run: ls -lah dist
    - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1


  publish-to-testpypi:
    if: github.repository_owner == 'sgkit-dev' && github.event_name == 'push' && (github.ref_name == 'test-publish' || startsWith(github.event.ref, 'refs/tags'))
    needs:
      - packaging
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/biofuse

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: python-package-distributions
        path: dist/
    - name: Show artifacts
      run: ls -lah dist
    - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
      with:
        verbose: true
        repository-url: https://test.pypi.org/legacy/
