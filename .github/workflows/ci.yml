name: CI

on:
  merge_group:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          python-version: "3.11"

      - name: Install lint group
        run: uv sync --locked --only-group lint

      - name: Run prek
        run: |
          uv run --locked --only-group lint \
          prek -c prek.toml run --all-files --show-diff-on-failure

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              fuse3 libfuse3-dev pkg-config \
              plink1.9 plink2

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group test

      - name: Run tests with coverage
        run: uv run pytest --cov=biofuse --cov-report=term-missing

  packaging:
    name: Packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev pkg-config

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          python-version: "3.12"

      - name: Install packaging deps
        run: uv sync --group packaging --no-default-groups

      - name: Validate pyproject
        run: uv run validate-pyproject pyproject.toml -v

      - name: Build artefacts
        run: uv build

      - name: Twine check
        run: uv run twine check --strict dist/*
